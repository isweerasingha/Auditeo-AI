analysis_task:
  description: >
    ### OBJECTIVE
    Perform a high-fidelity audit of {website_url} by cross-referencing {factual_metrics} 
    against the provided page content.

    ### STEP-BY-STEP PROCESS
    1. **Metric Validation:** Compare the `total_word_count` to the `cta_count`. Calculate the 'CTA Density' (CTAs per 500 words).
    2. **Hierarchical Integrity:** Audit the `heading_counts`. Look for 'Heading Gaps' (e.g., H1 followed immediately by H3).
    3. **Asset Optimization:** Analyze the `images_missing_alt_text_pct`. Evaluate the impact on accessibility and SEO Indexing.
    4. **Contextual Messaging:** Scan page_content for 'Primary Value Prop' (PVP). Does it exist in the H1? 
    5. **Structural UX:** Identify 'Conversion Friction'—where links/CTAs are present but messaging is too thin to drive clicks.

    ### RULES
    - NO GENERIC ADVICE. If you suggest adding alt text, you MUST cite the current percentage: {images_missing_alt_text_pct}%.
    - If `h1` count is not exactly 1, mark it as a 'Critical Architectural Failure.'
    - Use 'Auditeo AI' terminology: 'Metric-Content Mismatch' or 'CTA Fragmentation.'

    ### KPI RATING LOGIC (0-100)
    - SEO: Based on H-tags, Title, and Meta.
    - Links: Internal/External ratio (Optimal is 3:1).
    - Usability: Based on CTA accessibility and word-to-content ratio.
    - Social: Presence of Meta-descriptions and OG-readiness.

    ###  ======================== Source Page Content ========================
    {page_content}
  expected_output: >
    A multi-layered technical briefing containing 'Observed Facts', 'Strategic Implications', and raw KPI percentages.
  agent: analyst_agent

reporting_task:
  description: >
    ### OBJECTIVE
    Synthesize the 'Auditeo AI' briefing into a world-class Markdown Report and populate the `InsightCrewOutput` model.

    ### STEP-BY-STEP PROCESS
    1. **Executive Summary:** Generate a 2-sentence 'State of the Site' overview.
    2. **The Scorecard:** Render the SEO, Links, Usability, and Social KPIs in a clear visual format.
    3. **Strategic Deep Dive:** Organize findings into:
       - 'Technical Foundation' (SEO/Metadata)
       - 'User Psychology' (Messaging/CTAs)
       - 'Content Architecture' (Depth/Structure)
    4. **The Action Plan:** Provide 3-5 prioritized recommendations. Each must follow the 'Action-Reason-Impact' format.

    ### IMPORTANT NOTES
    - Use professional, enterprise-level Markdown (H1-H4, Tables, Blockquotes).
    - Bold all specific metrics used (e.g., **{total_word_count} words**).
    - Ensure the 'Action Plan' is ordered by 'Business Impact' (High to Low).

    ### RULES
    - Do not mention the scraping tool; act as if this was an expert human audit.
    - Ensure the final output is compatible with the `InsightCrewOutput` Pydantic class.
expected_output: >
    A fully populated `InsightCrewOutput` object containing KPIs, a detailed Markdown report, and prioritized Recommendations.
agent: reporter_agent